 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/monitor/manifest.json">
<meta name="theme-color" content="#C9A84C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GrowthIve">
<link rel="apple-touch-icon" href="/monitor/icons/icon-192.png">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/monitor/sw.js');}</script>
<title>Register — GrowthIve Monitor</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .auth-wrap {
    background: radial-gradient(ellipse at 40% 60%, rgba(201,168,76,0.08) 0%, transparent 60%), var(--dark);
  }
  .tc-row {
    display: flex; align-items: flex-start;
    gap: 12px; margin-bottom: 18px;
    padding: 12px 14px;
    background: var(--dark3);
    border: 1px solid var(--gold-border);
    border-radius: var(--radius-sm);
  }
  .tc-checkbox-wrap {
    flex-shrink: 0; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center; margin-top: 1px;
  }
  .tc-checkbox-wrap input[type=checkbox] {
    width: 24px; height: 24px; min-width: 24px;
    accent-color: var(--gold); cursor: pointer; margin: 0; padding: 0;
    background: var(--dark4); border: 2px solid var(--gold-border);
    border-radius: 4px; -webkit-appearance: checkbox; appearance: checkbox;
  }
  .tc-text { font-size: 0.83rem; color: var(--muted); line-height: 1.6; flex: 1; }
  .tc-text a { color: var(--gold); text-decoration: underline; font-weight: 500; display: inline-block; padding: 2px 0; }
  .tc-row.checked { border-color: var(--gold); background: var(--gold-dim); }
  .pw-wrap { position: relative; }
  .pw-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 1rem; padding: 4px;
    -webkit-tap-highlight-color: transparent;
  }
  .pw-wrap input { padding-right: 40px; }
  .strength-bar { height: 4px; border-radius: 2px; background: var(--dark4); margin-top: 6px; overflow: hidden; }
  .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease, background 0.3s ease; width: 0%; }
  .strength-text { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

  /* ── Language picker ── */
  .lang-picker-row {
    display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap;
  }
  .lang-option {
    flex: 1; min-width: 70px; padding: 10px 6px; text-align: center;
    border: 1px solid var(--gold-border); border-radius: var(--radius-sm);
    cursor: pointer; font-size: 0.8rem; color: var(--muted);
    transition: all 0.2s; background: var(--dark3); font-family: var(--font-body);
    font-weight: 500;
  }
  .lang-option:hover { border-color: var(--gold); color: var(--white2); }
  .lang-option.selected {
    border-color: var(--gold); background: rgba(201,168,76,0.15);
    color: var(--gold); font-weight: 700;
  }
  .lang-option .lang-flag { font-size: 1.2rem; display: block; margin-bottom: 3px; }
  .lang-section-label {
    font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px; font-weight: 600;
  }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">

    <!-- LOGO -->
    <div class="auth-logo">GrowthIve <span>Monitor</span></div>
    <div class="auth-tagline">Create your free business account</div>

    <!-- ORNAMENT -->
    <div style="width:50px;height:1px;background:var(--gold-border);margin:16px auto 24px;"></div>

    <!-- MESSAGE BOX -->
    <div id="msg"></div>

    <!-- FULL NAME -->
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="fullname" placeholder="John Doe" autocomplete="name">
    </div>

    <!-- BUSINESS NAME -->
    <div class="form-group">
      <label>Business Name</label>
      <input type="text" id="bizname" placeholder="My Business Ltd">
    </div>

    <!-- EMAIL -->
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <!-- PASSWORD -->
    <div class="form-group">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="Min. 6 characters"
               autocomplete="new-password" oninput="checkStrength()">
        <button class="pw-toggle" onclick="togglePw()" type="button" id="pw-eye">👁</button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-text" id="strength-text"></div>
    </div>

    <!-- CONFIRM PASSWORD -->
    <div class="form-group">
      <label>Confirm Password</label>
      <div class="pw-wrap">
        <input type="password" id="password2" placeholder="Repeat your password"
               autocomplete="new-password">
        <button class="pw-toggle" onclick="togglePw2()" type="button" id="pw-eye2">👁</button>
      </div>
    </div>

    <!-- ── LANGUAGE PREFERENCE ── -->
    <div style="margin-bottom:18px;">
      <div class="lang-section-label">🌐 Preferred Language</div>
      <div class="lang-picker-row" id="lang-picker">
        <div class="lang-option selected" onclick="selectLang('en', this)">
          <span class="lang-flag">🇬🇧</span>English
        </div>
        <div class="lang-option" onclick="selectLang('ha', this)">
          <span class="lang-flag">🇳🇬</span>Hausa
        </div>
        <div class="lang-option" onclick="selectLang('yo', this)">
          <span class="lang-flag">🇳🇬</span>Yoruba
        </div>
        <div class="lang-option" onclick="selectLang('ig', this)">
          <span class="lang-flag">🇳🇬</span>Igbo
        </div>
      </div>
      <div style="font-size:0.75rem;color:var(--muted);">
        You can change this anytime from Settings.
      </div>
    </div>

    <!-- TERMS & CONDITIONS -->
    <div class="tc-row" id="tc-row">
      <div class="tc-checkbox-wrap">
        <input type="checkbox" id="tc" onchange="toggleTCStyle()">
      </div>
      <div class="tc-text">
        <label for="tc" style="cursor:pointer;color:var(--muted);">I have read and agree to the</label>
        <a href="terms.html" target="_blank" onclick="event.stopPropagation()">Terms &amp; Conditions</a>
        <label for="tc" style="cursor:pointer;color:var(--muted);">of GrowthIve Monitor.</label>
      </div>
    </div>

    <!-- REGISTER BUTTON -->
    <button class="btn btn-gold btn-full" onclick="doRegister()" id="reg-btn">
      Create Account →
    </button>

    <div class="divider">or</div>

    <p style="text-align:center;font-size:0.88rem;color:var(--muted);">
      Already have an account?
      <a href="login.html" style="color:var(--gold);font-weight:600;">Sign in</a>
    </p>
    <p style="text-align:center;font-size:0.8rem;color:var(--muted);margin-top:14px;">
      <a href="index.html" style="color:var(--muted);text-decoration:none;">← Back to Home</a>
    </p>
    <p style="text-align:center;font-size:0.8rem;color:var(--muted);margin-top:8px;">
      Problem registering? <a href="contact.html" style="color:var(--gold);">Contact Support</a>
    </p>
    <div style="text-align:center;margin-top:28px;padding-top:20px;border-top:1px solid var(--gold-border);">
      <span style="font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);">
        Powered by GrowthIve Systems
      </span>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

<script>
  // Theme
  const saved = localStorage.getItem('theme');
  if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');

  // Track selected language
  let selectedLang = localStorage.getItem('growthive_lang') || 'en';

  // Pre-select saved language if user comes back to register page
  document.querySelectorAll('.lang-option').forEach(el => el.classList.remove('selected'));
  const preselect = document.querySelector(`.lang-option[onclick*="'${selectedLang}'"]`);
  if (preselect) preselect.classList.add('selected');

  function selectLang(code, el) {
    selectedLang = code;
    document.querySelectorAll('.lang-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    // Apply immediately so labels change if user picks Hausa etc
    localStorage.setItem('growthive_lang', code);
  }

  // Redirect if already logged in
  (async () => {
    const { data: { user } } = await _supabase.auth.getUser();
    if (user) window.location.href = 'returning.html';
  })();

  // T&C visual feedback
  function toggleTCStyle() {
    document.getElementById('tc-row').classList.toggle('checked', document.getElementById('tc').checked);
  }

  // Password strength
  function checkStrength() {
    const pw   = document.getElementById('password').value;
    const fill = document.getElementById('strength-fill');
    const text = document.getElementById('strength-text');
    let score = 0;
    if (pw.length >= 6)           score++;
    if (pw.length >= 10)          score++;
    if (/[A-Z]/.test(pw))        score++;
    if (/[0-9]/.test(pw))        score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const levels = [
      { label: '',          color: '',         width: '0%'   },
      { label: 'Weak',      color: '#e05555',  width: '25%'  },
      { label: 'Fair',      color: '#e0a855',  width: '50%'  },
      { label: 'Good',      color: '#5b9bd5',  width: '75%'  },
      { label: 'Strong 💪', color: '#4caf7d',  width: '100%' },
    ];
    const lvl = Math.min(score, 4);
    fill.style.width      = levels[lvl].width;
    fill.style.background = levels[lvl].color;
    text.textContent      = pw.length === 0 ? '' : levels[lvl].label;
    text.style.color      = levels[lvl].color;
  }

  function togglePw() {
    const input = document.getElementById('password');
    const eye   = document.getElementById('pw-eye');
    input.type  = input.type === 'password' ? 'text' : 'password';
    eye.textContent = input.type === 'password' ? '👁' : '🙈';
  }
  function togglePw2() {
    const input = document.getElementById('password2');
    const eye   = document.getElementById('pw-eye2');
    input.type  = input.type === 'password' ? 'text' : 'password';
    eye.textContent = input.type === 'password' ? '👁' : '🙈';
  }

  // Register
  async function doRegister() {
    const fullname  = document.getElementById('fullname').value.trim();
    const bizname   = document.getElementById('bizname').value.trim();
    const email     = document.getElementById('email').value.trim();
    const password  = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const tc        = document.getElementById('tc').checked;
    const msg       = document.getElementById('msg');
    const btn       = document.getElementById('reg-btn');

    msg.innerHTML = '';

    if (!fullname || !bizname || !email || !password || !password2) {
      msg.innerHTML = '<div class="alert alert-danger">⚠️ Please fill in all fields.</div>'; return;
    }
    if (password.length < 6) {
      msg.innerHTML = '<div class="alert alert-danger">⚠️ Password must be at least 6 characters.</div>'; return;
    }
    if (password !== password2) {
      msg.innerHTML = '<div class="alert alert-danger">❌ Passwords do not match.</div>'; return;
    }
    if (!tc) {
      const row = document.getElementById('tc-row');
      row.style.borderColor = 'var(--danger)';
      row.style.background  = 'rgba(224,85,85,0.08)';
      setTimeout(() => { row.style.borderColor = ''; row.style.background = ''; }, 3000);
      msg.innerHTML = '<div class="alert alert-danger">📄 Please tick the Terms &amp; Conditions checkbox.</div>';
      document.getElementById('tc-row').scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Creating account…';
    msg.innerHTML   = '<div class="alert alert-gold">⏳ Setting up your account, please wait…</div>';

    const { data, error } = await _supabase.auth.signUp({
      email, password,
      options: {
        emailRedirectTo: 'https://growthivesystems.github.io/monitor/login.html',
        data: { full_name: fullname, business_name: bizname }
      }
    });

    btn.disabled    = false;
    btn.textContent = 'Create Account →';

    if (error) {
      let errMsg = error.message;
      if (errMsg.includes('already registered') || errMsg.includes('already exists'))
        errMsg = '⚠️ This email is already registered. <a href="login.html" style="color:var(--gold);">Sign in instead</a>.';
      msg.innerHTML = `<div class="alert alert-danger">${errMsg}</div>`;
      return;
    }

    // Save profile including preferred language
    const userId = data.user?.id;
    if (userId) {
      await _supabase.from('profiles').upsert({
        id:                 userId,
        full_name:          fullname,
        business_name:      bizname,
        preferred_language: selectedLang   // ← saves chosen language to DB
      });
    }

    // Apply chosen language immediately
    localStorage.setItem('growthive_lang', selectedLang);
    localStorage.setItem('growthive_new_user', 'true');

    msg.innerHTML = `
      <div class="alert alert-success">
        ✅ Account created successfully!<br><br>
        📧 A confirmation email has been sent to <strong>${email}</strong>.<br>
        Please check your inbox and click the link to activate your account, then
        <a href="login.html" style="color:var(--success);font-weight:600;">sign in here</a>.
      </div>`;

    ['fullname','bizname','email','password','password2'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('tc').checked = false;
    document.getElementById('tc-row').classList.remove('checked');
    document.getElementById('strength-fill').style.width = '0%';
    document.getElementById('strength-text').textContent = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
</script>
</body>
</html>
