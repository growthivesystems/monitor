<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — GrowthIve Monitor</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">GrowthIve <span>Monitor</span></div>
    <div class="auth-tagline">Sign in to your business dashboard</div>
    <div id="msg"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn btn-gold btn-full" onclick="doLogin()">Sign In →</button>
    <div class="divider">or</div>
    <p style="text-align:center;font-size:0.85rem;color:var(--muted);">
      Don't have an account? <a href="register.html" style="color:var(--gold);">Create one free</a>
    </p>
    <p style="text-align:center;font-size:0.8rem;color:var(--muted);margin-top:10px;">
      <a href="index.html" style="color:var(--muted);">← Back to Home</a>
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
  const saved = localStorage.getItem('theme');
  if (saved === 'light') document.documentElement.setAttribute('data-theme','light');

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const msg = document.getElementById('msg');
    msg.innerHTML = '';
    if (!email || !password) {
      msg.innerHTML = '<div class="alert alert-danger">Please fill in all fields.</div>'; return;
    }
    msg.innerHTML = '<div class="alert alert-gold">Signing in…</div>';
    const { error } = await _supabase.auth.signInWithPassword({ email, password });
    if (error) {
      msg.innerHTML = `<div class="alert alert-danger">${error.message}</div>`; return;
    }
    window.location.href = 'dashboard.html';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  (async () => {
    const { data: { user } } = await _supabase.auth.getUser();
    if (user) window.location.href = 'dashboard.html';
  })();
</script>
</body>
</html>
