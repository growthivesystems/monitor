 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ — GrowthIve Monitor</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .faq-wrap { max-width:820px; margin:0 auto; padding:48px 24px; }
  .faq-hero { text-align:center; margin-bottom:40px; }
  .faq-hero .page-title { margin-bottom:8px; }
  .faq-hero p { color:var(--muted); font-size:0.92rem; max-width:520px; margin:0 auto 24px; line-height:1.7; }
  .faq-search { width:100%; max-width:480px; margin:0 auto 40px; display:block; background:var(--dark2); border:1px solid var(--gold-border); color:var(--white); padding:12px 18px; border-radius:30px; font-family:var(--font-body); font-size:0.9rem; outline:none; transition:border-color 0.3s; }
  .faq-search:focus { border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-dim); }
  .faq-section { margin-bottom:36px; }
  .faq-section-title { font-family:var(--font-display); font-size:1.2rem; font-weight:600; color:var(--gold); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--gold-border); display:flex; align-items:center; gap:10px; }
  .faq-item { background:var(--dark2); border:1px solid var(--gold-border); border-radius:var(--radius-sm); margin-bottom:8px; overflow:hidden; transition:border-color 0.3s; }
  .faq-item:hover { border-color:var(--gold); }
  .faq-item.active { border-color:var(--gold); }
  .faq-question { width:100%; background:none; border:none; padding:16px 18px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; text-align:left; color:var(--white2); font-family:var(--font-body); font-size:0.9rem; font-weight:500; transition:color 0.3s; gap:12px; }
  .faq-question:hover { color:var(--gold); }
  .faq-item.active .faq-question { color:var(--gold); }
  .faq-chevron { font-size:0.8rem; color:var(--muted); transition:transform 0.3s ease; flex-shrink:0; }
  .faq-item.active .faq-chevron { transform:rotate(180deg); color:var(--gold); }
  .faq-answer { max-height:0; overflow:hidden; transition:max-height 0.4s ease,padding 0.3s ease; padding:0 18px; color:var(--muted); font-size:0.87rem; line-height:1.8; }
  .faq-item.active .faq-answer { max-height:800px; padding:0 18px 16px; }
  .faq-answer p { margin-bottom:8px; }
  .faq-answer ul { padding-left:18px; margin-bottom:8px; }
  .faq-answer li { margin-bottom:4px; }
  .faq-answer strong { color:var(--white2); }
  .faq-answer .highlight { background:var(--gold-dim); border-left:3px solid var(--gold); padding:8px 12px; border-radius:0 var(--radius-sm) var(--radius-sm) 0; margin:8px 0; font-size:0.85rem; }
  .no-results { text-align:center; padding:40px; color:var(--muted); font-size:0.9rem; }
  .faq-footer { text-align:center; margin-top:48px; padding:32px; background:var(--dark2); border:1px solid var(--gold-border); border-radius:var(--radius); }
  .faq-footer p { color:var(--muted); font-size:0.88rem; margin-bottom:16px; }
  .new-badge { background:var(--gold); color:var(--dark); font-size:0.65rem; font-weight:700; padding:2px 6px; border-radius:10px; margin-left:6px; letter-spacing:0.05em; vertical-align:middle; }
</style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-brand">GrowthIve <span>Monitor</span></a>
  <div class="navbar-spacer"></div>
  <div id="lang-switcher-faq" style="display:flex;align-items:center;gap:2px;background:var(--dark3);border:1px solid var(--gold-border);border-radius:20px;padding:3px 5px;margin-right:8px;"></div>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
  <a href="login.html" class="btn btn-outline btn-sm">Login</a>
</nav>

<div class="faq-wrap">
  <div class="faq-hero">
    <div class="page-title">Frequently Asked Questions</div>
    <p>Everything you need to know about using GrowthIve Monitor to manage your business records effectively.</p>
    <input type="text" class="faq-search" id="faq-search" placeholder="🔍 Search questions…" oninput="searchFAQ()">
  </div>
  <div id="faq-content"></div>

  <div class="faq-footer">
    <div class="page-title" style="font-size:1.2rem;margin-bottom:8px;">Still have questions?</div>
    <p>Can't find what you're looking for? Our support team is here to help you.</p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <a href="contact.html" class="btn btn-gold">📧 Contact Support</a>
      <a href="dashboard.html" class="btn btn-outline">Go to Dashboard →</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/lang.js"></script>
<script>
  const saved = localStorage.getItem('theme');
  if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'light' ? '' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next || 'dark');
    document.querySelector('.theme-toggle').textContent = next === 'light' ? '☀️' : '🌙';
  }
  if (saved === 'light') document.querySelector('.theme-toggle').textContent = '☀️';

  // Render lang switcher
  (function() {
    const current = getLang();
    const langs = [{code:'en',label:'EN'},{code:'ha',label:'HA'},{code:'yo',label:'YO'},{code:'ig',label:'IG'}];
    document.getElementById('lang-switcher-faq').innerHTML = langs.map(l =>
      `<button onclick="setLang('${l.code}')" style="background:${current===l.code?'var(--gold)':'transparent'};color:${current===l.code?'var(--dark)':'var(--muted)'};border:none;border-radius:14px;cursor:pointer;font-size:0.7rem;font-weight:${current===l.code?'700':'500'};padding:3px 8px;transition:all 0.2s;font-family:var(--font-body);line-height:1;">${l.label}</button>`
    ).join('');
  })();

  const faqData = [
    {
      section: '🚀 Getting Started',
      items: [
        {
          q: 'What is GrowthIve Monitor?',
          a: `<p>GrowthIve Monitor is a digital business record management system designed for small and medium-sized business owners in Nigeria and across Africa. It helps you track daily sales, log expenses, manage inventory, record debts, and understand how your business is performing — all in one place.</p>
              <p>It is built by <strong>GrowthIve Systems</strong> to make business record-keeping simple, even if you are not a tech person.</p>`
        },
        {
          q: 'How do I create an account?',
          a: `<p>Creating an account is simple and free:</p>
              <ul>
                <li>Go to the <strong>Register page</strong> from the homepage</li>
                <li>Enter your full name, business name, email address, and a password</li>
                <li>Choose your <strong>preferred language</strong> (English, Hausa, Yoruba or Igbo)</li>
                <li>Tick the Terms & Conditions checkbox and click <strong>Create Account</strong></li>
                <li>Check your email inbox for a confirmation link and click it</li>
              </ul>
              <p>Once your email is confirmed, you can log in and start using the app immediately.</p>`
        },
        {
          q: 'What is the Welcome page I see after registering?',
          a: `<p>The first time you log in after registering, you will see a personalised <strong>Welcome page</strong> that greets you by name and confirms your business is set up. It gives you a quick overview of what the app can do and lets you either read the FAQ or skip straight to the dashboard.</p>
              <p>After your first login, you will instead see a <strong>Welcome Back</strong> screen each time you log in, showing smart alerts, reminders, and your key business stats from that day.</p>`
        },
        {
          q: 'How do I log in?',
          a: `<p>Go to the <strong>Login page</strong>, enter your registered email address and password, then click <strong>Sign In</strong>. Your language preference will be applied automatically as soon as you log in.</p>`
        },
        {
          q: 'How do I reset my password if I forget it?',
          a: `<p>On the Login page, click <strong>"Forgot Password?"</strong>. Enter your registered email address, then click that button. A password reset link will be sent to your email. Click the link and you will be able to set a new password. The link expires after 1 hour.</p>`
        }
      ]
    },
    {
      section: '🌐 Language & Localisation',
      new: true,
      items: [
        {
          q: 'What languages does GrowthIve Monitor support?',
          a: `<p>GrowthIve Monitor supports four languages:</p>
              <ul>
                <li>🇬🇧 <strong>English</strong> — default language</li>
                <li>🇳🇬 <strong>Hausa</strong> — complete translation of all pages</li>
                <li>🇳🇬 <strong>Yoruba</strong> — complete translation of all pages</li>
                <li>🇳🇬 <strong>Igbo</strong> — complete translation of all pages</li>
              </ul>
              <p>The entire app — sidebar, page titles, forms, buttons, labels, alerts and notifications — is translated into your chosen language.</p>`
        },
        {
          q: 'How do I choose my language?',
          a: `<p>You can choose your language in three ways:</p>
              <ul>
                <li><strong>When registering</strong> — there is a language picker (EN / HA / YO / IG) on the registration form. Select your language before creating your account and the app will be in that language from your very first login.</li>
                <li><strong>From the navbar</strong> — on any page after logging in, you will see EN / HA / YO / IG buttons in the top right corner of the navbar. Tap any one to switch immediately.</li>
                <li><strong>From Settings</strong> — go to Settings → Preferences to change your language preference.</li>
              </ul>`
        },
        {
          q: 'Will my language choice be remembered after logging out?',
          a: `<p>Yes. Your language preference is saved to your account profile in our database. When you log in again — even on a different device or browser — the app will automatically load in your chosen language. You do not need to select it again.</p>`
        },
        {
          q: 'What happens if I add a new word or feature that is not yet translated?',
          a: `<p>GrowthIve Monitor uses a smart two-layer translation system:</p>
              <ul>
                <li><strong>Layer 1 — Built-in dictionary</strong>: All existing words and phrases are translated instantly from a local dictionary — no internet needed and no delay.</li>
                <li><strong>Layer 2 — Gemini AI fallback</strong>: Any new word or button added in future updates that is not yet in the dictionary is automatically sent to Google Gemini AI for translation. The result is saved permanently, so it only ever translates once per new word.</li>
              </ul>
              <p>This means new features you add will automatically translate without you needing to edit any language files manually.</p>`
        },
        {
          q: 'Why does the brand name "GrowthIve Monitor" not translate?',
          a: `<p>Brand names, product names and technical terms like "GrowthIve Monitor", "POS", "CSV", and "PDF" are protected from translation. This is intentional — these are proper nouns that should remain the same in all languages, just as "Coca-Cola" remains "Coca-Cola" in every language.</p>`
        }
      ]
    },
    {
      section: '💰 Daily Sales',
      items: [
        {
          q: 'How do I record my daily sales?',
          a: `<p>Go to <strong>Daily Sales</strong> in the sidebar. You will see a form where you can choose between two modes:</p>
              <ul>
                <li><strong>Simple Sales Record</strong> — enter a total amount for the day</li>
                <li><strong>⭐ Premium Sales Record</strong> — break down sales by Cash, Transfer, and POS payment types</li>
              </ul>
              <p>Sales recorded via the <strong>Purchases / POS page</strong> automatically sync here — you do not need to enter them again.</p>`
        },
        {
          q: 'What is the difference between Daily Sales and the Purchases (POS) page?',
          a: `<p><strong>Daily Sales</strong> is for manually entering your total sales amount for the day — useful for traditional businesses that do not use the POS system in the app.</p>
              <p><strong>Purchases / POS</strong> is a full point-of-sale system where you select items from your stock catalogue, add them to a cart, select the payment method, and complete the sale. Stock is automatically deducted when you complete a sale. All POS transactions automatically appear in Daily Sales and Reports.</p>`
        },
        {
          q: 'What is the Cash Float Tracker?',
          a: `<p>The Cash Float Tracker helps you know exactly how much physical cash you should have at the end of the day.</p>
              <div class="highlight">Formula: Opening Balance + Cash Sales − Cash Paid Out = Closing Cash Balance</div>
              <p>Example: You started with ₦50,000. You made ₦100,000 cash sales. You paid out ₦30,000. Your closing cash = ₦120,000.</p>`
        }
      ]
    },
    {
      section: '🛒 Purchases / POS System',
      new: true,
      items: [
        {
          q: 'How does the Purchases / POS page work?',
          a: `<p>The Purchases page is a full point-of-sale system. Here is how to use it:</p>
              <ul>
                <li>Browse or search your <strong>Item Catalogue</strong> on the left</li>
                <li>Tap any item to add it to the <strong>Current Order</strong> on the right</li>
                <li>Adjust quantities using the + and − buttons</li>
                <li>Select the payment method (Cash, Transfer, or POS)</li>
                <li>Optionally enter the customer name and notes</li>
                <li>Click <strong>Complete Sale →</strong> to finalise</li>
              </ul>
              <p>When a sale is completed, stock quantities are automatically reduced and the transaction is recorded in both Daily Sales and Reports.</p>`
        },
        {
          q: 'What are tracked items vs untracked / service items?',
          a: `<p><strong>Tracked stock</strong> (shown with a green indicator): Items with a quantity greater than 0. When you sell these via POS, the quantity automatically decreases. You will get a low stock alert when they run low.</p>
              <p><strong>Service / Untracked</strong> (shown with a blue diamond): Items with a quantity of 0 or items that are services. Selling these does not affect any stock count — they are included in your revenue but not tracked as physical inventory.</p>`
        },
        {
          q: 'What happens when an item runs out of stock?',
          a: `<p>Items that are tracked (quantity > 0) and have sold out will show as <strong>Out of Stock</strong> with a red X in the catalogue. You cannot sell an out-of-stock tracked item via POS. You need to restock it first through the Inventory page.</p>`
        }
      ]
    },
    {
      section: '📦 Inventory & Stock',
      items: [
        {
          q: 'How do I add a stock item?',
          a: `<p>Go to <strong>Inventory</strong> in the sidebar. Fill in the item name, current quantity, unit price, and the low stock threshold. Click <strong>Add to Stock List</strong>. The item will appear in your stock list immediately and in the Purchases catalogue.</p>`
        },
        {
          q: 'How do I import many stock items at once?',
          a: `<p>On the Inventory page, click the <strong>Import button</strong>. You can download a <strong>CSV template</strong>, fill it in with all your items using Excel or Google Sheets, then upload it back. The system will preview all items before importing so you can check for errors. This is much faster than adding items one by one if you have a large catalogue.</p>`
        },
        {
          q: 'How do I export my stock list?',
          a: `<p>On the Inventory page, click <strong>CSV</strong> to download your full stock list as a spreadsheet, or click <strong>PDF</strong> to get a printable version. This is useful for stock-taking, sharing with a supplier, or keeping offline records.</p>`
        },
        {
          q: 'What is the Full Audit Trail?',
          a: `<p>Every change made to your inventory is permanently recorded — additions, edits, deletions, restorations, imports and sales. You can view the full log by clicking the <strong>Inventory Activity Log</strong> section on the Inventory page. This helps you track if any unexpected changes were made to your stock.</p>`
        },
        {
          q: 'Why do I need to verify my email to edit stock?',
          a: `<p>Stock editing requires email verification to prevent staff from secretly changing quantities to cover up theft or errors. When you click Edit on any item, a verification link is sent to your registered email. Only the account owner can make changes.</p>`
        },
        {
          q: 'Can I recover a deleted stock item?',
          a: `<p>Yes. Deleted items are kept for <strong>30 days</strong> before permanent removal. During this time, they appear in the <strong>Recently Deleted</strong> section at the bottom of the Inventory page. Click <strong>Restore</strong> to bring an item back. After 30 days, you can click <strong>Purge</strong> to permanently remove it.</p>`
        }
      ]
    },
    {
      section: '📋 Expenses',
      items: [
        {
          q: 'How do I log a business expense?',
          a: `<p>Go to <strong>Expenses</strong> in the sidebar. Fill in the date, description, and amount. Click <strong>Save Expense</strong>. Examples: rent, generator fuel, staff salary, stock purchase, transport, utility bills.</p>`
        },
        {
          q: 'How is my profit or loss calculated?',
          a: `<div class="highlight"><strong>Profit / Loss = Total Sales − Total Expenses</strong></div>
              <p>This is shown on the Expenses page and Dashboard for the current month. Sales from both Daily Sales records and POS transactions are included.</p>`
        }
      ]
    },
    {
      section: '🤝 Debt Tracker',
      items: [
        {
          q: 'What is the difference between "They owe me" and "I owe them"?',
          a: `<p><strong>They owe me (Credit)</strong> — money someone owes YOU. A customer bought on credit. Money coming TO you.</p>
              <p><strong>I owe them (Debit)</strong> — money YOU owe someone. You bought from a supplier on credit. Money going FROM you.</p>
              <div class="highlight">Net Position = Total owed to you − Total you owe</div>`
        },
        {
          q: 'How do I mark a debt as paid?',
          a: `<p>In the Unpaid debts tab, each record has a <strong>✓ Paid button</strong>. Click it to mark that debt as settled. It will move to the Paid tab. Overdue debts (past the due date) will appear as alerts on your Welcome Back screen each login.</p>`
        }
      ]
    },
    {
      section: '📈 Reports & Analytics',
      items: [
        {
          q: 'How do reports work?',
          a: `<p>Go to <strong>Reports</strong> in the sidebar. Switch between <strong>Weekly, Monthly, and Quarterly</strong> views. Reports include sales from both manual Daily Sales entries and POS transactions, plus all logged expenses. You can export as CSV or print as PDF.</p>`
        },
        {
          q: 'How do I export my reports?',
          a: `<p>On the Reports page, click <strong>📊 Export CSV</strong> to download all data as a spreadsheet, or click <strong>🖨️ Print / Save PDF</strong> for a formatted printable version.</p>`
        }
      ]
    },
    {
      section: '🏆 Business Health Score',
      items: [
        {
          q: 'How is the Business Health Score calculated?',
          a: `<p>Your score is out of 100 points based on 6 areas:</p>
              <ul>
                <li><strong>Sales Activity (20 pts)</strong> — how many days this month you recorded sales</li>
                <li><strong>Profitability (25 pts)</strong> — your profit margin</li>
                <li><strong>Expense Tracking (20 pts)</strong> — how many expenses you have logged</li>
                <li><strong>Debt Health (20 pts)</strong> — unpaid debt vs sales ratio</li>
                <li><strong>Stock Management (10 pts)</strong> — inventory levels</li>
                <li><strong>Business Planning (5 pts)</strong> — reminders set</li>
              </ul>`
        },
        {
          q: 'What does each score range mean?',
          a: `<ul>
                <li><strong>85–100 — Excellent 🏆</strong>: Outstanding business health</li>
                <li><strong>70–84 — Good ✅</strong>: Doing well with minor improvements possible</li>
                <li><strong>50–69 — Fair ⚠️</strong>: Needs attention</li>
                <li><strong>30–49 — Poor 🔴</strong>: Urgent attention needed</li>
                <li><strong>Below 30 — Critical ❌</strong>: Very little data or serious issues</li>
              </ul>`
        }
      ]
    },
    {
      section: '⚙️ Settings & Account',
      items: [
        {
          q: 'How do I change my language after registering?',
          a: `<p>You can change your language at any time in two ways:</p>
              <ul>
                <li><strong>Navbar switcher</strong> — tap EN / HA / YO / IG in the top right of any page</li>
                <li><strong>Settings page</strong> — go to Settings → Preferences → Language</li>
              </ul>
              <p>Your new language choice is saved to your profile and will be remembered across all devices.</p>`
        },
        {
          q: 'How do I change my business name or profile?',
          a: `<p>Go to <strong>Settings → Profile</strong>. Update your full name, business name, and phone number. Click <strong>Save Profile →</strong>. Your new name will appear across the app immediately.</p>`
        },
        {
          q: 'How do I switch between dark and light mode?',
          a: `<p>Click the <strong>moon icon 🌙</strong> in the top navbar. It toggles to light mode and shows a sun ☀️. Your preference is saved automatically.</p>`
        },
        {
          q: 'How do I log out?',
          a: `<p>Click <strong>Sign Out</strong> (or "Fita" / "Jade" / "Pụọ" depending on your language) at the bottom of the sidebar. Your language preference and data are safely stored and will be there when you log back in.</p>`
        }
      ]
    },
    {
      section: '💳 Billing & General',
      items: [
        {
          q: 'Is GrowthIve Monitor free to use?',
          a: `<p>Yes, GrowthIve Monitor is currently free to use. All features including language support, POS, inventory management, reports, and health score are available at no cost.</p>`
        },
        {
          q: 'Is my business data private and secure?',
          a: `<p>Yes. Your data is stored securely with Row Level Security — only you can see your own business data. We do not sell or share your data with third parties.</p>`
        },
        {
          q: 'Can I use GrowthIve Monitor on my phone?',
          a: `<p>Yes. GrowthIve Monitor is fully responsive and works on smartphones, tablets, and desktops. The sidebar collapses into a menu on smaller screens for easy navigation.</p>`
        },
        {
          q: 'How do I contact support?',
          a: `<p>Go to the <strong>Support page</strong> in the sidebar, fill in the contact form, and we will respond within 24 hours. You can also email us at <strong>growthivesystem@gmail.com</strong>.</p>`
        }
      ]
    }
  ];

  function renderFAQ(data) {
    const container = document.getElementById('faq-content');
    if (data.length === 0) {
      container.innerHTML = '<div class="no-results">No questions found matching your search. Try a different keyword.</div>';
      return;
    }
    container.innerHTML = data.map(section => `
      <div class="faq-section">
        <div class="faq-section-title">
          ${section.section}
          ${section.new ? '<span class="new-badge">NEW</span>' : ''}
        </div>
        ${section.items.map((item, i) => `
          <div class="faq-item" id="faq-${section.section.replace(/\s/g,'')}-${i}">
            <button class="faq-question" onclick="toggleFAQ('faq-${section.section.replace(/\s/g,'')}-${i}')">
              <span>${item.q}</span>
              <span class="faq-chevron">▼</span>
            </button>
            <div class="faq-answer">${item.a}</div>
          </div>
        `).join('')}
      </div>
    `).join('');
  }

  function toggleFAQ(id) {
    const item = document.getElementById(id);
    const isActive = item.classList.contains('active');
    document.querySelectorAll('.faq-item.active').forEach(el => el.classList.remove('active'));
    if (!isActive) item.classList.add('active');
  }

  function searchFAQ() {
    const q = document.getElementById('faq-search').value.toLowerCase().trim();
    if (!q) { renderFAQ(faqData); return; }
    const filtered = faqData.map(section => ({
      ...section,
      items: section.items.filter(item =>
        item.q.toLowerCase().includes(q) || item.a.toLowerCase().includes(q)
      )
    })).filter(section => section.items.length > 0);
    renderFAQ(filtered);
  }

  renderFAQ(faqData);

  // Auto-translate FAQ page
  setTimeout(() => {
    if (typeof autoTranslatePage === 'function') autoTranslatePage();
  }, 200);
</script>
</body>
</html>
