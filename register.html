<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — GrowthIve Monitor</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .auth-wrap {
    background: radial-gradient(ellipse at 60% 30%, rgba(201,168,76,0.08) 0%, transparent 60%), var(--dark);
  }
  .pw-wrap { position: relative; }
  .pw-toggle {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 1rem; padding: 0;
  }
  .pw-wrap input { padding-right: 40px; }
  .tc-row {
    display: flex; align-items: flex-start; gap: 10px; margin-bottom: 18px;
  }
  .tc-row input[type=checkbox] {
    width: 18px; height: 18px; flex-shrink: 0;
    margin-top: 2px; accent-color: var(--gold); cursor: pointer;
  }
  .tc-row label { font-size: 0.83rem; color: var(--muted); cursor: pointer; }
  .tc-row label a { color: var(--gold); }
  .strength-bar {
    height: 4px; border-radius: 2px; margin-top: 6px;
    transition: all 0.3s ease; width: 0%;
  }
  .strength-text { font-size: 0.75rem; margin-top: 4px; }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-logo">GrowthIve <span>Monitor</span></div>
    <div class="auth-tagline">Create your free business account</div>

    <div style="width:50px;height:1px;background:var(--gold-border);margin:16px auto 24px;"></div>

    <div id="msg"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="fullname" placeholder="John Doe" autocomplete="name">
    </div>

    <div class="form-group">
      <label>Business Name</label>
      <input type="text" id="bizname" placeholder="My Business Ltd">
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="Min. 6 characters"
          autocomplete="new-password" oninput="checkStrength()">
        <button class="pw-toggle" onclick="togglePw('password','eye1')" type="button" id="eye1">👁</button>
      </div>
      <div class="strength-bar" id="strength-bar"></div>
      <div class="strength-text" id="strength-text"></div>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <div class="pw-wrap">
        <input type="password" id="confirm-password" placeholder="Repeat your password"
          autocomplete="new-password">
        <button class="pw-toggle" onclick="togglePw('confirm-password','eye2')" type="button" id="eye2">👁</button>
      </div>
    </div>

    <div class="tc-row">
      <input type="checkbox" id="tc">
      <label for="tc">
        I have read and agree to the
        <a href="terms.html" target="_blank">Terms & Conditions</a>
        of GrowthIve Monitor.
      </label>
    </div>

    <button class="btn btn-gold btn-full" id="reg-btn" onclick="doRegister()">
      Create Account →
    </button>

    <div class="divider">or</div>

    <p style="text-align:center;font-size:0.88rem;color:var(--muted);">
      Already have an account?
      <a href="login.html" style="color:var(--gold);font-weight:600;">Sign In</a>
    </p>

    <p style="text-align:center;font-size:0.8rem;color:var(--muted);margin-top:14px;">
      <a href="index.html" style="color:var(--muted);text-decoration:none;">← Back to Home</a>
    </p>

    <div style="text-align:center;margin-top:28px;padding-top:20px;border-top:1px solid var(--gold-border);">
      <span style="font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);">
        Powered by GrowthIve Systems
      </span>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>

  const saved = localStorage.getItem('theme');
  if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');

  (async () => {
    const { data: { user } } = await _supabase.auth.getUser();
    if (user) window.location.href = 'dashboard.html';
  })();

  function checkStrength() {
    const pw = document.getElementById('password').value;
    const bar = document.getElementById('strength-bar');
    const text = document.getElementById('strength-text');
    let score = 0;
    if (pw.length >= 6) score++;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const levels = [
      { label: '', color: 'transparent', width: '0%' },
      { label: 'Weak', color: 'var(--danger)', width: '25%' },
      { label: 'Fair', color: '#e09a2a', width: '50%' },
      { label: 'Good', color: 'var(--gold)', width: '75%' },
      { label: 'Strong', color: 'var(--success)', width: '100%' },
    ];
    const level = levels[Math.min(score, 4)];
    bar.style.width = level.width;
    bar.style.background = level.color;
    text.textContent = pw.length > 0 ? level.label : '';
    text.style.color = level.color;
  }

  function togglePw(inputId, eyeId) {
    const input = document.getElementById(inputId);
    const eye = document.getElementById(eyeId);
    if (input.type === 'password') {
      input.type = 'text'; eye.textContent = '🙈';
    } else {
      input.type = 'password'; eye.textContent = '👁';
    }
  }

  async function doRegister() {
    const fullname = document.getElementById('fullname').value.trim();
    const bizname  = document.getElementById('bizname').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm-password').value;
    const tc       = document.getElementById('tc').checked;
    const msg      = document.getElementById('msg');
    const btn      = document.getElementById('reg-btn');

    msg.innerHTML = '';

    if (!fullname) {
      msg.innerHTML = '<div class="alert alert-danger">⚠️ Please enter your full name.</div>'; return;
    }
    if (!bizname) {
      msg.innerHTML = '<div class="alert alert-danger">⚠️ Please enter your business name.</div>'; return;
    }
    if (!email) {
      msg.innerHTML = '<div class="alert alert-danger">⚠️ Please enter your email address.</div>'; return;
    }
    if (password.length < 6) {
      msg.innerHTML = '<div class="alert alert-danger">⚠️ Password must be at least 6 characters.</div>'; return;
    }
    if (password !== confirm) {
      msg.innerHTML = '<div class="alert alert-danger">⚠️ Passwords do not match.</div>'; return;
    }
    if (!tc) {
      msg.innerHTML = '<div class="alert alert-danger">⚠️ You must accept the Terms & Conditions to register.</div>'; return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating account…';
    msg.innerHTML = '<div class="alert alert-gold">⏳ Setting up your account…</div>';

    const { data, error } = await _supabase.auth.signUp({ email, password });

    btn.disabled = false;
    btn.textContent = 'Create Account →';

    if (error) {
      let errMsg = error.message;
      if (errMsg.includes('already registered') || errMsg.includes('already been registered'))
        errMsg = '❌ This email is already registered. <a href="login.html" style="color:var(--gold);">Sign in instead</a>.';
      else if (errMsg.includes('rate limit') || errMsg.includes('sending') || errMsg.includes('confirmation'))
        errMsg = '⚠️ Email sending issue. Please try again in a few minutes.';
      msg.innerHTML = `<div class="alert alert-danger">${errMsg}</div>`;
      return;
    }

    const userId = data.user?.id;
    if (userId) {
      await _supabase.from('profiles').upsert({
        id: userId,
        full_name: fullname,
        business_name: bizname
      });
    }

    msg.innerHTML = `
      <div class="alert alert-success">
        ✅ Account created! Check <strong>${email}</strong> for a confirmation link, then
        <a href="login.html" style="color:var(--success);font-weight:600;">sign in here</a>.
      </div>`;

    document.getElementById('fullname').value = '';
    document.getElementById('bizname').value = '';
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
    document.getElementById('confirm-password').value = '';
    document.getElementById('tc').checked = false;
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doRegister();
  });

</script>
</body>
</html>
